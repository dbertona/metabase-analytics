# Apache Superset - PS Analytics (stack principal)

services:
  superset:
    build:
      context: ./docker/superset
    image: ps-superset:4.1.2-poc
    container_name: superset
    restart: unless-stopped
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-PsSupersetSecretKey2026ChangeMe}
      SUPERSET_LOAD_EXAMPLES: "no"
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-PsSuperset#2026xK9!}
    volumes:
      - ./config/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./data/superset-home:/app/superset_home
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname PowerSolution --email admin@powersolution.es --password \"$$SUPERSET_ADMIN_PASSWORD\" || true &&
      superset init &&
      /usr/bin/run-server.sh
      "
    networks:
      - ps_admin_default

networks:
  ps_admin_default:
    external: true
